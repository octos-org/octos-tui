[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app.
# NOTE: Homebrew is intentionally NOT generated by dist. The formula now lives
# IN THIS REPO at Formula/octos-tui.rb (this repo is its own tap) and is bumped
# by .github/workflows/publish-homebrew.yml on release. See that workflow.
installers = ["shell", "powershell", "npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Publish the npm package under the @octos-org scope -> `npm i -g @octos-org/octos-tui`
npm-scope = "@octos-org"
# Ship the self-updater + install receipt so `octos-tui update` can self-update
# in-place (and defer to brew/npm when installed that way).
install-updater = true
# npm is published by dist; Homebrew runs as a custom publish job
# (.github/workflows/publish-homebrew.yml) so it executes inside the release
# pipeline — a standalone `release: published` workflow would not fire, since
# dist creates the release with GITHUB_TOKEN.
publish-jobs = ["npm", "./publish-homebrew"]
# Prereleases (rc/beta tags) get a GitHub prerelease + installers but are NOT
# pushed to npm/Homebrew, so they don't take the npm `latest` tag or move the
# stable formula. (Flip to true temporarily when you want to test an rc's
# npm/brew one-liners before a stable tag.)
publish-prereleases = false
# Only dry-run ("plan") on PRs; full release artifacts run on tag pushes.
pr-run-mode = "plan"
