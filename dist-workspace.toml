[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# .github/workflows/release.yml is intentionally hand-edited (#415): prereleases
# publish to npm under the `@next` dist-tag while stable takes `@latest`, which
# dist can't express natively (its `publish-prereleases = false` would skip npm
# for prereleases entirely). `allow-dirty = ["ci"]` stops `dist plan` from
# regenerating-and-diffing the workflow, so PR plan checks pass and a future
# `dist generate`/upgrade won't silently clobber the @next logic. Re-apply the
# hand-edit by hand after any deliberate `dist init`.
allow-dirty = ["ci"]
# The installers to generate for each app.
# NOTE: Homebrew is intentionally NOT generated by dist. The formula now lives
# IN THIS REPO at Formula/octos-tui.rb (this repo is its own tap) and is bumped
# by .github/workflows/publish-homebrew.yml on release. See that workflow.
installers = ["shell", "powershell", "npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Publish the npm package under the @octos-org scope -> `npm i -g @octos-org/octos-tui`
npm-scope = "@octos-org"
# Ship the self-updater + install receipt so `octos-tui update` can self-update
# in-place (and defer to brew/npm when installed that way).
install-updater = true
# npm is published by dist. Homebrew is handled OUT OF BAND by
# .github/workflows/publish-homebrew.yml, a standalone workflow triggered by the
# same tag push. It is deliberately NOT a dist custom publish job: dist caps
# custom-job permissions to id-token/packages, and a reusable workflow cannot
# elevate to the contents:write needed to commit Formula/octos-tui.rb to main.
publish-jobs = ["npm"]
# Prereleases (rc/beta tags) publish to SEPARATE channels that never touch
# stable, so `npm i -g @octos-org/octos-tui` and `brew install …/octos-tui`
# always resolve to the latest STABLE build:
#   - npm:  published under the `next` dist-tag -> `@octos-org/octos-tui@next`.
#           The `publish-npm` job in .github/workflows/release.yml computes
#           `--tag next` vs `--tag latest` from the plan's
#           `announcement_is_prerelease`; a prerelease never takes `latest`.
#   - brew: a SEPARATE `octos-tui-dev` formula (class OctosTuiDev), rendered by
#           .github/workflows/publish-homebrew.yml. The stable `octos-tui`
#           formula is never touched by a prerelease tag.
# This flag stays FALSE on purpose: it governs cargo-dist's OWN npm publish,
# which would push a prerelease to the `latest` dist-tag — exactly what the
# two-channel scheme avoids. release.yml's `publish-npm` override does the
# prerelease publish itself with `--tag next`, so cargo-dist's latest-publish
# must stay off. (Do NOT flip this to true; it would re-enable latest-tagging
# of prereleases alongside our `--tag next` publish.)
publish-prereleases = false
# Only dry-run ("plan") on PRs; full release artifacts run on tag pushes.
pr-run-mode = "plan"
