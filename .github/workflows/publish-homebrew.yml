name: Publish Homebrew Formula
# Custom `dist` publish job (referenced as "./publish-homebrew" in
# dist-workspace.toml's publish-jobs). dist invokes this reusable workflow
# during the release pipeline's publish stage — AFTER the host job has uploaded
# the release tarballs — so it runs in the same run as the release that created
# them. (A standalone `release: published` trigger would NOT fire, because dist
# creates the release with the built-in GITHUB_TOKEN and GitHub suppresses
# workflow runs from token-created events.)
#
# The octos-tui formula lives IN THIS REPO at Formula/octos-tui.rb (this repo is
# its own tap -> `brew tap octos-org/octos-tui https://github.com/octos-org/octos-tui`).
# This job renders it from the released tarballs' checksums and pushes it to
# main (main is NOT branch-protected). Uses the built-in GITHUB_TOKEN — no
# HOMEBREW_TAP_TOKEN needed. Prereleases are skipped so the stable formula never
# tracks an rc/beta.

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-homebrew:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PLAN: ${{ inputs.plan }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Derive tag from the dist plan
        id: meta
        run: |
          set -euo pipefail
          tag=$(echo "$PLAN" | jq -r '.announcement_tag')
          is_pre=$(echo "$PLAN" | jq -r '.announcement_is_prerelease')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_pre" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag (prerelease=$is_pre)"

      - name: Skip formula update for prereleases
        if: ${{ steps.meta.outputs.is_prerelease == 'true' }}
        run: echo "::notice::${{ steps.meta.outputs.tag }} is a prerelease — Formula/octos-tui.rb tracks stable only; skipping."

      # Check out main (the release pipeline runs on the tag; the formula must
      # land on the default branch, which is what `brew tap` reads).
      - uses: actions/checkout@v4
        if: ${{ steps.meta.outputs.is_prerelease != 'true' }}
        with:
          ref: main

      - name: Download release tarballs for the tag
        if: ${{ steps.meta.outputs.is_prerelease != 'true' }}
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          triples="aarch64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu"
          # The host job uploads assets just before this publish stage; poll a bit
          # in case they aren't all visible yet (draft release is fine for gh).
          for attempt in $(seq 1 30); do
            missing=0
            for triple in $triples; do
              asset="octos-tui-${triple}.tar.xz"
              [ -f "artifacts/$asset" ] && continue
              gh release download "$TAG" --repo "${{ github.repository }}" \
                --pattern "$asset" --dir artifacts 2>/dev/null || true
              [ -f "artifacts/$asset" ] || missing=1
            done
            [ "$missing" = 0 ] && break
            echo "attempt $attempt: waiting for all tarball assets to publish..."
            sleep 10
          done
          for triple in $triples; do
            test -f "artifacts/octos-tui-${triple}.tar.xz" \
              || { echo "::error::missing octos-tui-${triple}.tar.xz after wait"; exit 1; }
          done
          ls -la artifacts

      - name: Render formula and commit to main
        if: ${{ steps.meta.outputs.is_prerelease != 'true' }}
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          sha_darwin_arm=$(sha256sum artifacts/octos-tui-aarch64-apple-darwin.tar.xz | awk '{print $1}')
          sha_linux_arm=$(sha256sum artifacts/octos-tui-aarch64-unknown-linux-gnu.tar.xz | awk '{print $1}')
          sha_linux_x64=$(sha256sum artifacts/octos-tui-x86_64-unknown-linux-gnu.tar.xz | awk '{print $1}')

          mkdir -p Formula
          cp packaging/homebrew/octos-tui.rb Formula/octos-tui.rb
          sed -i "s|__VERSION__|${version}|g" Formula/octos-tui.rb
          sed -i "s|__TAG__|${TAG}|g" Formula/octos-tui.rb
          sed -i "s|__SHA_DARWIN_ARM__|${sha_darwin_arm}|g" Formula/octos-tui.rb
          sed -i "s|__SHA_LINUX_ARM__|${sha_linux_arm}|g" Formula/octos-tui.rb
          sed -i "s|__SHA_LINUX_X64__|${sha_linux_x64}|g" Formula/octos-tui.rb

          echo "----- rendered Formula/octos-tui.rb -----"
          cat Formula/octos-tui.rb

          if git diff --quiet -- Formula/octos-tui.rb; then
            echo "Formula/octos-tui.rb unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "octos-release-bot"
          git config user.email "151983+ymote@users.noreply.github.com"
          git add Formula/octos-tui.rb
          git commit -m "octos-tui ${TAG}: update Homebrew formula"
          git push origin HEAD:main
