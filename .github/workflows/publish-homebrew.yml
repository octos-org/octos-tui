name: Publish Homebrew Formula
# The octos-tui Homebrew formula lives IN THIS REPO at Formula/octos-tui.rb
# (this repo is its own tap -> `brew tap octos-org/octos-tui https://github.com/octos-org/octos-tui`).
#
# This is a STANDALONE workflow triggered by the same version tag push that
# starts release.yml — NOT a dist custom publish job and NOT `release: published`:
#   - `release: published` would never fire, because dist creates the release
#     with the built-in GITHUB_TOKEN and GitHub suppresses token-created events.
#   - a dist custom publish job cannot get contents:write — dist caps custom-job
#     permissions to id-token/packages and a reusable workflow can't elevate.
# A tag push is human-initiated, so it fires reliably, exposes the tag as
# `ref_name`, and lets this workflow own its `contents: write`.
#
# It runs in parallel with release.yml and polls the release until dist has
# uploaded all the tarballs (Rust cross-compiles for 4 targets can take a
# while), then renders the formula from their checksums and pushes it to main
# (main is NOT branch-protected). GITHUB_TOKEN only.
#
# TWO-CHANNEL scheme (mirrors dist-workspace.toml + release.yml's npm publish):
#   - STABLE tag (no '-'): render Formula/octos-tui.rb (class OctosTui) from
#     packaging/homebrew/octos-tui.rb — the stable channel, unchanged.
#   - PRERELEASE tag (has a '-', e.g. v0.2.2-rc.15): render the SEPARATE
#     Formula/octos-tui-dev.rb (class OctosTuiDev) from
#     packaging/homebrew/octos-tui-dev.rb, pointed at the prerelease assets.
# A prerelease NEVER touches the stable Formula/octos-tui.rb, so
# `brew install octos-org/octos-tui/octos-tui` stays STABLE while
# `brew install octos-org/octos-tui/octos-tui-dev` tracks the latest prerelease.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  homebrew:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Select formula channel (stable vs prerelease)
        id: gate
        run: |
          # A tag with a '-' (e.g. v0.2.2-rc.15) is a prerelease -> render the
          # SEPARATE dev formula; otherwise render the stable formula. Either
          # way we render + commit (no more skipping) so both channels stay live.
          if [[ "$TAG" == *-* ]]; then
            echo "::notice::$TAG is a prerelease — rendering the dev formula (octos-tui-dev); stable octos-tui is untouched."
            {
              echo "channel=prerelease"
              echo "formula_file=Formula/octos-tui-dev.rb"
              echo "template_file=packaging/homebrew/octos-tui-dev.rb"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$TAG is a stable release — rendering the stable formula (octos-tui)."
            {
              echo "channel=stable"
              echo "formula_file=Formula/octos-tui.rb"
              echo "template_file=packaging/homebrew/octos-tui.rb"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release tarballs for the tag
        run: |
          set -euo pipefail
          mkdir -p artifacts
          triples="aarch64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu"
          # This workflow starts at the same instant as release.yml, so the
          # tarballs won't exist yet. Poll generously — a 4-target Rust release
          # build commonly takes 10-20 min. 60 * 30s = 30 min.
          for attempt in $(seq 1 60); do
            missing=0
            for triple in $triples; do
              asset="octos-tui-${triple}.tar.xz"
              [ -f "artifacts/$asset" ] && continue
              gh release download "$TAG" --repo "${{ github.repository }}" \
                --pattern "$asset" --dir artifacts 2>/dev/null || true
              [ -f "artifacts/$asset" ] || missing=1
            done
            [ "$missing" = 0 ] && break
            echo "attempt $attempt/60: waiting for release.yml to upload all tarballs..."
            sleep 30
          done
          for triple in $triples; do
            test -f "artifacts/octos-tui-${triple}.tar.xz" \
              || { echo "::error::missing octos-tui-${triple}.tar.xz after wait (did release.yml fail?)"; exit 1; }
          done
          ls -la artifacts

      - name: Render formula and commit to main
        env:
          # The channel-specific source template and destination formula, chosen
          # by the gate above (stable -> octos-tui, prerelease -> octos-tui-dev).
          TEMPLATE_FILE: ${{ steps.gate.outputs.template_file }}
          FORMULA_FILE: ${{ steps.gate.outputs.formula_file }}
          CHANNEL: ${{ steps.gate.outputs.channel }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          sha_darwin_arm=$(sha256sum artifacts/octos-tui-aarch64-apple-darwin.tar.xz | awk '{print $1}')
          sha_linux_arm=$(sha256sum artifacts/octos-tui-aarch64-unknown-linux-gnu.tar.xz | awk '{print $1}')
          sha_linux_x64=$(sha256sum artifacts/octos-tui-x86_64-unknown-linux-gnu.tar.xz | awk '{print $1}')

          mkdir -p Formula
          cp "$TEMPLATE_FILE" "$FORMULA_FILE"
          sed -i "s|__VERSION__|${version}|g" "$FORMULA_FILE"
          sed -i "s|__TAG__|${TAG}|g" "$FORMULA_FILE"
          sed -i "s|__SHA_DARWIN_ARM__|${sha_darwin_arm}|g" "$FORMULA_FILE"
          sed -i "s|__SHA_LINUX_ARM__|${sha_linux_arm}|g" "$FORMULA_FILE"
          sed -i "s|__SHA_LINUX_X64__|${sha_linux_x64}|g" "$FORMULA_FILE"

          echo "----- rendered ${FORMULA_FILE} (${CHANNEL}) -----"
          cat "$FORMULA_FILE"

          if git diff --quiet -- "$FORMULA_FILE"; then
            echo "${FORMULA_FILE} unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "octos-release-bot"
          git config user.email "151983+ymote@users.noreply.github.com"
          git add "$FORMULA_FILE"
          git commit -m "octos-tui ${TAG}: update Homebrew formula (${CHANNEL})"
          git push origin HEAD:main
