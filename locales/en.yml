# --- menu chrome + command descriptions (full i18n pass) ---
command:
  activity:
    desc: Search and filter sessions, tasks, and activity.
  add_model:
    desc: Add or change the profile's AI model (family, model, and provider route).
  agents:
    desc: Inspect or interrupt backend-owned subagents.
  aliases_label: 'Aliases:'
  context:
    desc: Context-window controls — compact now, and choose LLM vs heuristic summarization.
  copy:
    desc: Copy the last assistant reply to your clipboard (works over SSH).
  cost:
    desc: Show server-reported token and cost usage.
  dock:
    desc: Sub-agent dock — switch views, unread results, collapse or expand the strip.
  exit:
    desc: Quit the TUI.
  profiles:
    desc: Manage local profiles — list, set the default, delete, or create one.
  goal:
    desc: View, set, pause, resume, stop, or clear the persisted session goal.
  help:
    desc: Show available commands.
  keymap:
    desc: Inspect and edit TUI key bindings.
  lang:
    desc: Switch the UI display language, e.g. /lang zh (en, zh).
  login:
    desc: Sign in with email OTP or inspect current auth state.
  loop:
    desc: Create, list, pause, resume, fire-now, or delete backend loops.
  mcp:
    desc: List or configure server-owned MCP entries when supported.
  model:
    desc: Choose a server-returned profile LLM model.
  onboard:
    desc: Open the setup wizard to configure or reconfigure your profile, provider, model, and workspace.
  permissions:
    desc: Review or change approval, filesystem, and network permissions.
  provider:
    desc: Configure profile-owned LLM providers and routes.
  ps:
    desc: Show background task and process status.
  review:
    desc: Start the backend-owned code review workflow.
  skills:
    desc: List, search, install, or remove profile skills.
  status:
    desc: Show snapshot-backed session, runtime, and connection status.
  statusline:
    desc: Configure bottom status line items.
  stop:
    desc: Interrupt the active turn or stop supported background work.
  task:
    desc: Read backend task artifacts.
  theme:
    desc: Choose the local TUI theme.
  saveconfig:
    desc: "Save the active appearance, language and scroll-mode to the config file."
  scrollmode:
    desc: 'Switch wheel-scroll behavior: /scrollmode [native|pinned] (bare toggles).'
  vimmode:
    desc: "Toggle Vim modal editing in the composer (Normal/Insert)."
  thinking:
    desc: 'Set reasoning effort for thinking models: /thinking low|medium|high|max|default.'
  threads:
    desc: Inspect the backend thread graph.
  title:
    desc: Configure terminal title items.
  tools:
    desc: List or configure server-owned tool settings when supported.
  turn:
    desc: Inspect backend turn lifecycle state.
menu:
  agents:
    item:
      dock_collapse:
        label: Collapse the dock to a summary pill
      dock_expand:
        label: Expand the dock to per-agent rows
      dock_toggle:
