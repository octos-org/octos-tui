# octos-tui UI strings — English (source / fallback locale).
#
# Keys are dotted via nested YAML. Add a key here and its translation in
# zh.yml (and any future locale). Use `%{var}` for interpolation, e.g.
#   status.turn_completed: "Turn completed in Protocol session at seq %{seq}"
# referenced as `t!("status.turn_completed", seq = seq)`.
#
# Coverage so far: composer placeholder, the onboarding welcome / local-solo
# profile entry screen, and the /lang command. Other menus + the status bar
# are converted incrementally (the `t!()` pattern + these files are the
# template).
composer:
  placeholder: "Ask Octos to change code..."

app:
  banner:
    title: "Welcome to Octos — Your Coding Buddy"
    greeting_named: "Welcome back — %{profile}"
    greeting_default: "Welcome to Octos"
    hint: "Ask Octos anything to begin."
    onboarding_setup: "Onboarding setup..."
  pane:
    sessions: "Sessions"
    tasks: "Tasks"
    artifacts: "Artifacts"
    plan: "Plan"
    workspace: "Workspace"
    git: "Git"
    composer: "Composer"
    transcript: "Transcript"
    task_output: "Task Output"
    artifact_modal: "Artifact"
    threads: "Threads"
    turn: "Turn"
  empty:
    no_tasks: "No tasks yet"
    no_artifacts: "No artifacts in snapshot"
    no_session: "No session selected"
    no_plan: "No active plan"
    no_plan_hint: "Plan text is inferred from assistant/live replies."
    no_task_output: "No output loaded for this task yet"
    no_diff: "No diff preview loaded"
    no_file_changes: "No file changes"
  approval:
    title: "Approval Requested"
    action_once: "y = approve this command once"
    action_session: "s = approve this command/scope for the session"
    action_deny: "n = deny it"
    action_diff: "d = view diff"
  question:
    header_multi: "Question %{n}/%{total}"
    header_single: "Question"
    card_title: "Agent asked a question"
    no_options: "No answerable options were provided."
    free_text_row: "Other (free text)"
    other_prefix: "Other"
    action_toggle: "Up/Down move | Space toggle | type for Other"
    action_submit: "Enter = submit answer(s) | Esc = hide"
    action_next: "Enter = next question | Esc = hide"
    action_dismiss: "Esc = dismiss (no answer to submit)"
  activity:
    orchestrating: "Orchestrating..."
    re_entering: "Re-entering (continuing)..."
    finished_errors: "Agent task finished with errors"
    completed: "Agent task completed"
    running: "running"
    preview_ready: "preview ready"
    older_actions: "... +%{count} older action(s)"
  diff:
    title: "Diff Preview"
    inline_patch: "Inline patch"
    loading: "Loading diff preview..."
  autonomy:
    goal_prefix: "Goal: "
    loops_running: "Loops: %{count} running"
  status:
    state_label: "state"
    idle: "Idle"
    working: "Working"
    blocked: "Blocked"
    done: "Done"
    error: "Error"
    interactive: "interactive"
    read_only: "read-only"
    approval_gated: "approval gated"
    sends_disabled: "sends disabled"
    no_session: "no session"
    turn_active: "active %{id}"
    turn_idle: "idle"
  harness:
    orchestrating: "Orchestrating"
    re_entering: "Re-entering"
    working: "Working"
  composer_hint:
    queued_messages: "Queued messages (%{count}) after active turn | Esc interrupt/send | Ctrl+U clear"
    large_paste: "Large paste collapsed | Enter sends full text | Ctrl+U clear"
    multiline_tail_lines: "Multiline input | showing tail, %{count} earlier line(s) hidden | Enter sends full text | Ctrl+U clear"
    multiline_tail_line: "Multiline input | showing tail of long line | Enter sends full text | Ctrl+U clear"

onboarding:
  welcome_title: "Welcome to Octos"
  value_not_set: "not set"
  action_edit: "Enter edit"
  field:
    full_name: "Full name"
    username: "Username"
    email: "Email"
  local:
    title: "Create your local Octos profile"
    description: "This stays on this machine; no email OTP is sent."
    subtitle: "Set up a local solo profile to continue."
    continue: "Continue"
    create_action: "Create profile"
    footer: "Up/Down choose | Enter edit or continue | type value, Enter save"
  wizard:
    # Wizard chrome shared by the local-profile and provider-setup screens.
    setup_title: "Octos Setup Wizard"
    progress_title: "Setup progress"
    header: "Step %{number} of %{total} — %{title}"
    subtitle: "%{header} · %{purpose}"
    footer: "Next: %{next} | Up/Down move | Enter select | Esc close"
    # Short checklist labels (right-side panel), one per step.
    step:
      profile: "Profile"
      provider: "Provider"
      connect: "Connect"
      save: "Save"
      workspace: "Workspace"
      activate: "Activate"
    # One-line purpose ("why this step exists") per step.
    purpose:
      profile: "Create a local identity for Octos. Stays on this machine; no email is sent."
      provider: "Pick which AI model Octos talks to (model family, model, and provider route)."
      connect: "Paste the provider API key and run a live test so we know the model answers."
      save: "Save the verified provider into your profile so it persists."
      workspace: "Choose and validate the folder Octos may read and edit while coding."
      activate: "Activate the workspace: open the coding session and start working."
    # Activate row (provider-setup screen) label + description.
    activate_ready_label: "▶ Activate workspace — open coding session (Enter)"
    activate_blocked_label: "Activate workspace — open coding session"
    activate_ready_description: "Ready. Press Enter here to open the session and start coding."
    activate_blocked_description: "Complete the steps above first (%{reason})."
    # `Next: ...` footer phrases, in dependency order.
    next:
      load_catalog: "load the provider catalog"
      choose_family: "choose a model family"
      choose_model: "choose a model"
      choose_route: "choose a provider route"
      paste_key: "paste your API key"
      test_provider: "test the provider"
      save_provider: "save the provider"
      validate_workspace: "validate the workspace"
      activate: "press Enter on Activate to start coding"
      finish_remaining: "finish the remaining steps"
      # Local-profile (step 1) next-action phrases.
      local_continue: "Continue to create the profile"
      local_fill_fields: "fill name, username, and email"

lang:
  # `switched` renders in the NEWLY-selected locale, so it names itself.
  switched: "Language switched to English."
  usage: "Current language: %{current}. Usage: /lang <en|zh>."
  unknown: "Unknown language '%{value}'. Available: en, zh."
thinking:
  usage: "Reasoning effort: %{current}. Usage: /thinking <low|medium|high|max|default>."
  set: "Reasoning effort set to %{level}."
  cleared: "Reasoning effort cleared — using the server default."
  unknown: "Unknown effort '%{value}'. Available: low, medium, high, max, default."
  no_session: "No active session — open or select a session first."

status:
  # Read-only mode feedback
  readonly_turn_disabled: "Read-only mode: turn/start disabled"
  # /stop when no active turn
  no_active_turn: "No active turn to interrupt"
  # /theme feedback
  theme_set: "Theme: %{theme}"
  theme_unknown: "Unknown theme: %{theme}"
  # Status-line / terminal-title layout picks
  statusline_layout_selected: "Status line layout selected: %{items}"
  terminal_title_layout_selected: "Terminal title layout selected: %{items}"
  # Keymap save placeholder
  keymap_save_not_wired: "Keymap save is not wired yet"
  # Menu field-edit prompt
  edit_field_prompt: "Edit the field, then press Enter"
  # Unimplemented local menu action
  local_action_not_wired: "Local menu action `%{name}` is not wired yet"
