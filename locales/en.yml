    save_provider_first: "save provider first"
    validate_workspace_first: "validate workspace first"
    workspace_validating: "workspace validation in progress"
    workspace_invalid: "workspace invalid: %{reason}"
  preview:
    provider:
      configured_title: "Configured (read-only here):"
      profile: "Profile"
      selected: "Selected provider"
    workspace:
      staged_title: "Staged (set via commands — not selectable here):"
      workspace: "Workspace"
      workspace_hint: "/onboard workspace <path>   (try `.` for the current folder)"
      permissions_hint: "/onboard permissions <default|read-only|workspace-write|full-access>"
  wizard:
    # Wizard chrome shared by the local-profile and provider-setup screens.
    setup_title: "Octos Setup Wizard"
    progress_title: "Setup progress"
    header: "Step %{number} of %{total} — %{title}"
    subtitle: "%{header} · %{purpose}"
    footer: "Next: %{next} | Up/Down move | Enter select | Esc close"
    # Short checklist labels (right-side panel), one per step.
    step:
      language: "Language"
      profile: "Profile"
      provider: "Provider"
      connect: "Connect"
      save: "Save"
      workspace: "Workspace"
      activate: "Activate"
    # One-line purpose ("why this step exists") per step.
    purpose:
      language: "Choose the UI language. English is selected by default."
      profile: "Create a local identity for Octos. Stays on this machine; no email is sent."
      provider: "Pick which AI model Octos talks to (model family, model, and provider route)."
      connect: "Paste the provider API key and run a live test so we know the model answers."
      save: "Save the verified provider into your profile so it persists."
      workspace: "Choose and validate the folder Octos may read and edit while coding."
      activate: "Activate the workspace: open the coding session and start working."
    # Right-pane TEACHING panel (A.3). `explain_title` heads the pane;
    # `explain_progress` is the compact progress line; `explain_now` heads the
    # current-step prose. Each `explain.<step>` is multi-line prose ("\n" breaks)
    # describing what the step is for, what to do, and why it matters.
    explain_title: "About this step"
    explain_progress: "Setup progress — step %{number} of %{total}"
    explain_now: "Now: %{title}"
    explain:
      language: "Choose the language Octos uses while you finish setup.\nEnglish is selected by default. Pick 中文 if you want the rest of onboarding and the app to switch immediately.\nYou can change this later with `/lang`."
      profile: "Octos needs a local profile to attach your settings, providers, and history to.\nGive it a short name (like work or research) and continue. The name is just a label — it has nothing to do with which model you run; you choose that next, and can add or change models anytime with /add-model. (Older servers ask for name, username, and email instead.)\nThis profile stays on this machine; nothing is sent."
      provider: "Choose which AI model powers Octos.\nPick a model family (e.g. GPT, Claude), then a specific model, then the provider route that serves it (official or an alternative).\nThis decides who Octos talks to and how good the coding help is — you can change it later."
      connect: "Prove the model actually answers before you rely on it.\nPaste your provider API key, then run the live test. Octos sends one small request and reports success or the exact error.\nThis catches a bad key or wrong route now, not mid-task."
      save: "Persist the verified provider into your profile JSON so it survives restarts.\nSave it as your primary provider (or add it as a fallback). Until you save, the route lives only in this session.\nAfter saving, the workspace step unlocks."
      workspace: "Pick the project folder Octos may read and edit while coding.\nIt defaults to the folder you launched from; override it with `/onboard workspace <path>` (try `.` for the current folder). Then validate — Octos checks the path exists, is a directory, and is writable.\nA valid workspace is required before you can activate."
      activate: "Open the coding session and drop into the working surface.\nEverything above is done: profile created, provider saved and tested, workspace validated. Press Enter on Activate to start.\nThis is the finish line — after it you are coding with Octos."
    # Workspace step screen (B.2): its own title + the row on the provider
    # screen that opens it.
    workspace_title: "Octos Setup — Workspace"
    workspace_open_label: "Continue to Workspace →"
    workspace_open_description: "Stage and validate the project folder Octos will code in, then activate."
    workspace_locked_reason: "save a provider first"
    finish_label: "Finish — brain ready →"
    finish_description: "Your brain is set up. Relaunch Octos here to start a session with it."
    # Activate row (provider-setup screen) label + description.
    activate_ready_label: "▶ Activate workspace — open coding session (Enter)"
    activate_blocked_label: "Activate workspace — open coding session"
    activate_ready_description: "Ready. Press Enter here to open the session and start coding."
    activate_blocked_description: "Complete the steps above first (%{reason})."
    # `Next: ...` footer phrases, in dependency order.
    next:
      load_catalog: "load the provider catalog"
      choose_family: "choose a model family"
      choose_model: "choose a model"
      choose_route: "choose a provider route"
      paste_key: "paste your API key"
      test_provider: "test the provider"
      save_provider: "save the provider"
      validate_workspace: "validate the workspace"
      activate: "press Enter on Activate to start coding"
      finish_remaining: "finish the remaining steps"
      # Local-profile (step 1) next-action phrases.
      local_continue: "Continue to create the profile"
      local_fill_fields: "fill name, username, and email"

